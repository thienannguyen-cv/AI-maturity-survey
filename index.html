<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đánh giá độ trưởng thành tích hợp AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"IBM Plex Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['"IBM Plex Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          colors: {
            paper:       'var(--c-paper)',
            ink:         'var(--c-ink)',
            muted:       'var(--c-muted)',
            line:        'var(--c-line)',
            accent:      'var(--c-accent)',
            'accent-soft': 'var(--c-accent-soft)',
            warn:        'var(--c-warn)',
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --c-paper: oklch(0.972 0.008 80);
      --c-ink: oklch(0.205 0.018 250);
      --c-muted: oklch(0.50 0.012 250);
      --c-line: oklch(0.885 0.012 80);
      --c-accent: oklch(0.46 0.055 195);
      --c-accent-soft: oklch(0.945 0.022 80);
      --c-accent-ring: oklch(0.945 0.022 80 / 0.7);
      --c-warn: oklch(0.55 0.08 50);
    }
    html.dark {
      --c-paper: oklch(0.185 0.014 250);
      --c-ink: oklch(0.945 0.006 80);
      --c-muted: oklch(0.62 0.012 250);
      --c-line: oklch(0.30 0.014 250);
      --c-accent: oklch(0.72 0.07 195);
      --c-accent-soft: oklch(0.255 0.020 220);
      --c-accent-ring: oklch(0.255 0.020 220 / 0.7);
      --c-warn: oklch(0.72 0.10 60);
    }

    html, body { background: var(--c-paper); }
    body {
      font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
      font-feature-settings: "ss01", "cv11";
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      color: var(--c-ink);
      /* subtle paper grain */
      background-image:
        radial-gradient(circle at 1px 1px, rgba(0,0,0,0.018) 1px, transparent 0);
      background-size: 22px 22px;
    }
    html.dark body {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
    }

    /* slide-in transition */
    .slide-in {
      animation: slideIn 380ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(var(--dir, 20px)); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .slide-in { animation: none; }
    }

    /* focus states */
    :focus-visible {
      outline: 2px solid var(--c-ink);
      outline-offset: 2px;
      border-radius: 2px;
    }
    label:has(input[type="radio"]:focus-visible) {
      outline: 2px solid var(--c-ink);
      outline-offset: 2px;
    }

    /* better defaults */
    .text-balance { text-wrap: balance; }

    /* selection */
    ::selection { background: var(--c-ink); color: var(--c-paper); }

    /* Recharts text */
    .recharts-polar-angle-axis-tick-value { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Recharts + Babel -->
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/recharts@2.13.3/umd/Recharts.js" crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <!-- YAML parser + survey content + components -->
  <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js" crossorigin="anonymous"></script>
  <script src="data.js"></script>
  <script type="text/babel" data-presets="react" src="survey.jsx"></script>

  <!-- Mount -->
  <script type="text/babel" data-presets="react">
    (function tryMount(){
      if (!window.Survey || !window.SURVEY_DATA || !window.Recharts) {
        return setTimeout(tryMount, 60);
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<window.Survey />);
    })();
  </script>
</body>
</html>
