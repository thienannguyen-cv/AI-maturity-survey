# AI Integration Maturity Survey — content source of truth.
# Edit this file to change question text, options, tiers, weights, or notes.
# The web app reads this YAML at runtime; refresh to see changes.

survey:
  version: "1.1"
  title: "Khảo sát mức độ trưởng thành của việc tích hợp AI trong dự án phần mềm"
  disclaimer: |-
    Kết quả khảo sát chỉ có giá trị tham khảo và giúp định vị tương đối mức độ trưởng thành trong tích hợp AI vào dự án phần mềm. Đây không phải chứng nhận, audit độc lập, hay kết luận tuyệt đối về năng lực team. Các tiêu chí được tổng hợp từ thực hành hiện nay và hỗ trợ phân tích bằng AI, nên cần đọc cùng bối cảnh dự án và phản hồi mở của người tham gia.
  methodology:
    label: "Tài liệu phương pháp và cơ sở thiết kế survey"
    title: "AI Maturity Research Strategy Revision"
    url: "https://github.com/thienannguyen-cv/AI-maturity-survey/blob/main/AI%20Maturity%20Research%20Strategy%20Revision.docx"

scoring:
  scale_max: 5
  default_weight: 1
  not_applicable:
    label: "Chưa áp dụng trong dự án"
    handling: "exclude_from_total_and_max"
  tier_metric: "percent_of_applicable_weighted_score"
  note: |-
    Điểm mỗi câu = score của option * weight của câu. N/A không cộng điểm và không tính vào điểm tối đa áp dụng.
    Weight 3 dùng cho năng lực nền tảng/rủi ro cao; weight 2 dùng cho năng lực vận hành quan trọng; weight 1 dùng cho năng lực nâng cao hoặc bổ trợ.
  weight_guidance:
    - weight: 3
      label: "Nền tảng / rủi ro cao"
      description: "Defect handling, HITL, evals, sandbox/security."
    - weight: 2
      label: "Vận hành quan trọng"
      description: "Planning, context, harness, cost, model fit."
    - weight: 1
      label: "Nâng cao / bổ trợ"
      description: "Skills, multi-agent orchestration, team enablement."

open_response:
  enabled: true
  label: "Bổ sung bối cảnh (tuỳ chọn)"
  placeholder: "Ví dụ: artifact đang có, cách team đang làm, lý do bạn chọn mức này, hoặc điểm bạn còn phân vân."

survey_feedback:
  enabled: true
  title: "Góp ý & cải thiện"
  eyebrow: "Phần cuối · không tính điểm"
  description: |-
    Nếu có điểm nào trong bài survey mà bạn cảm thấy chưa đúng, cần sự thay đổi, hoặc bạn muốn đề xuất thêm tiêu chí/cách diễn đạt, hãy ghi lại ở đây. Phản hồi này giúp cải thiện chất lượng survey cho các vòng sau.
  placeholder: "Ví dụ: Câu nào khó hiểu? Có tiêu chí nào thiếu? Cách chia weight có hợp lý không? Có option nào chưa phản ánh đúng thực tế dự án của bạn?"

demographics:
  - id: a1
    label: "Vai trò gần nhất của bạn trong dự án này là gì?"
    options:
      - "Producer / Project Producer"
      - "Product Owner / Product Manager"
      - "Engineering Manager / Delivery Manager"
      - "Tech Lead đang kiêm điều phối delivery"
      - "Khác nhưng có trách nhiệm điều phối dự án"
  - id: a2
    label: "Quy mô team đang tham gia dự án (kể cả người dùng AI tools thường xuyên)"
    options:
      - "1–3 người"
      - "4–10 người"
      - "11–30 người"
      - ">30 người"
  - id: a3
    label: "Dự án đã tích hợp AI vào quy trình delivery bao lâu?"
    options:
      - "<3 tháng"
      - "3–12 tháng"
      - "1–2 năm"
      - ">2 năm"
  - id: a4
    label: "Mức độ rủi ro của domain dự án gần nhất với lựa chọn nào?"
    options:
      - "Internal tool hoặc prototype, rủi ro thấp"
      - "Sản phẩm khách hàng dùng, rủi ro trung bình"
      - "Hệ thống ảnh hưởng dữ liệu nhạy cảm, tài chính, bảo mật hoặc pháp lý"
      - "Nền tảng/core service nhiều team phụ thuộc"
      - "Không rõ"

groups:
  - id: planning
    name: "Lập kế hoạch delivery & phạm vi"
    short: "Planning"
    description: "Cách producer và team biến AI thành một biến số có thể lập kế hoạch, thay vì chỉ kỳ vọng tốc độ tăng chung chung."
  - id: context
    name: "Context & tri thức tái sử dụng"
    short: "Context"
    description: "Cách team cung cấp context, duy trì coherence và đóng gói tri thức để agent làm việc ổn định."
  - id: quality
    name: "Chất lượng, HITL & evals"
    short: "Quality"
    description: "Cách team phát hiện lỗi, phân quyền cho human, và kiểm chứng output AI một cách lặp lại."
  - id: operations
    name: "Harness, vận hành & governance"
    short: "Operations"
    description: "Cách team đo lường, cô lập runtime, quản lý chi phí và vận hành agent như một hệ thống."
  - id: capability
    name: "Năng lực agent & enablement đội ngũ"
    short: "Capability"
    description: "Cách team chọn model, phối hợp agent và lan tỏa năng lực AI trong tổ chức."

tiers:
  # Boundaries derived from original spec: L1.0/1.8/2.7/3.6/4.4/5.0 mapped
  # to weighted-percentage (score/max). E.g. all L1 answers => 20%, all L5 => 100%.
  - min: 0
    max: 36
    name: "Ad-hoc"
    recommendation: |-
      AI chủ yếu đang được dùng như nỗ lực cá nhân. Ưu tiên chuẩn hóa cách giao việc, PR review, sandbox tối thiểu và một bộ test/eval nhỏ.
  - min: 37
    max: 54
    name: "Repeatable"
    recommendation: |-
      Đã có pattern lặp lại nhưng còn phụ thuộc cá nhân. Bước tiếp theo là thống nhất definition of ready/done, logging cơ bản và checklist HITL.
  - min: 55
    max: 72
    name: "Defined"
    recommendation: |-
      Quy trình đã tương đối rõ. Bước tiếp theo là đưa đo lường định lượng vào các điểm quan trọng: evals, defect escape, intervention rate và cost.
  - min: 73
    max: 88
    name: "Managed"
    recommendation: |-
      Team đã quản lý AI như một phần của delivery system. Bước tiếp theo là tăng độ tự động của feedback loop và kiểm soát rủi ro theo dữ liệu.
  - min: 89
    max: 100
    name: "Optimizing"
    recommendation: |-
      Team vận hành AI ở mức rất trưởng thành. Tập trung vào sustainability, chuẩn hóa ở quy mô tổ chức và cải tiến liên tục dựa trên eval/telemetry.

questions:
  - id: 1
    group: planning
    weight: 2
    topic: "Ước lượng công sức Phase 1"
    short: "Ước lượng"
    text: |-
      Khi dự án bước vào pha đầu tiên (discovery, POC, setup, kiến trúc khởi tạo), team của bạn ước lượng công sức như thế nào trong bối cảnh AI tham gia vào quy trình code?
    measure: "Mức độ tích hợp yếu tố AI vào sizing/agile planning."
    note: |-
      Dấu hiệu trưởng thành không phải là “AI làm nhanh hơn”, mà là team biết phần nào nhanh hơn, phần nào phát sinh thêm review/context/eval.
    options:
      - level: 1
        score: 1
        text: |-
          Estimate gần giống dự án truyền thống; AI không được tính như biến số riêng.
      - level: 2
        score: 2
        text: |-
          Giảm effort cho task “AI có vẻ làm được”, chủ yếu dựa vào cảm tính của senior/dev lead.
      - level: 3
        score: 3
        text: |-
          Có template sizing xét context, phạm vi thay đổi, test cần chạy và mức reasoning của task.
      - level: 4
        score: 4
        text: |-
          Log thời gian agent, số lần phải sửa/làm lại sau review, thời gian human review và dùng dữ liệu đó để hiệu chuẩn estimate.
      - level: 5
        score: 5
        text: |-
          Có pipeline hoặc dashboard dự báo effort/risk từ lịch sử ticket, độ đầy đủ context và complexity của repo.

  - id: 14
    group: planning
    weight: 2
    topic: "Phân rã phạm vi cho AI"
    short: "Task slicing"
    text: |-
      Khi nhận một feature/epic mới, producer và team chia nhỏ công việc như thế nào để AI agent tham gia hiệu quả mà không làm tăng việc phải sửa/làm lại?
    measure: "Khả năng biến scope sản phẩm thành các lát công việc phù hợp với AI."
    note: |-
      AI thường hiệu quả hơn với task có boundary rõ, acceptance criteria rõ và cách kiểm chứng rõ.
    options:
      - level: 1
        score: 1
        text: |-
          Chia ticket như trước đây; dev tự quyết định có hỏi AI hay không.
      - level: 2
        score: 2
        text: |-
          Có gắn nhãn vài ticket “AI làm được”, nhưng tiêu chí chọn còn cảm tính.
      - level: 3
        score: 3
        text: |-
          Có checklist chọn task phù hợp cho AI: phạm vi nhỏ, đầu ra rõ, test/review có thể chạy được.
      - level: 4
        score: 4
        text: |-
          Backlog phân luồng rõ: agent draft, human design, pair-with-agent, hoặc human-only theo rủi ro.
      - level: 5
        score: 5
        text: |-
          Hệ thống gợi ý cách chia task và mức độ tự tin dựa trên repo, lịch sử phải sửa/làm lại, mức độ có test/check bảo vệ khu vực liên quan và rủi ro; producer review trước sprint.

  - id: 15
    group: planning
    weight: 2
    topic: "Readiness trước khi giao việc cho agent"
    short: "Readiness"
    text: |-
      Trước khi một ticket được giao cho dev sử dụng agent, ticket đó phải có những thông tin tối thiểu nào để giảm hiểu sai và giảm việc phải sửa/làm lại trong review/verify?
    measure: "Mức độ trưởng thành của definition of ready cho AI-assisted delivery."
    note: |-
      Prompt tốt không thay thế được một ticket mơ hồ. Readiness là trách nhiệm của delivery, không chỉ là kỹ năng prompt của dev.
    options:
      - level: 1
        score: 1
        text: |-
          Agent nhận prompt ngắn hoặc mô tả miệng; thiếu acceptance criteria và cách kiểm chứng.
      - level: 2
        score: 2
        text: |-
          Có link ticket/tài liệu, nhưng context phụ thuộc dev tự nhớ và tự bổ sung.
      - level: 3
        score: 3
        text: |-
          Các tiêu chuẩn bao gồm acceptance criteria, module liên quan, test command và constraint quan trọng.
      - level: 4
        score: 4
        text: |-
          Mỗi run bắt đầu từ task packet: mục tiêu, context, rủi ro, người review/rollback và lệnh verify.
      - level: 5
        score: 5
        text: |-
          Readiness score (của ticket) được kiểm tra tự động; agent bị chặn khi thiếu thông tin quan trọng hoặc test baseline.

  - id: 2
    group: context
    weight: 2
    topic: "Khởi tạo session với AI"
    short: "Session start"
    text: |-
      Khi một dev bắt đầu một session code với AI agent (Claude Code, Cursor, Copilot, ...), session đó được khởi tạo như thế nào?
    measure: "Mức độ trưởng thành của context engineering ở giai đoạn priming."
    note: |-
      Có một file context chung là tốt, nhưng file quá dài hoặc luôn được load toàn bộ có thể làm agent kém tập trung.
    options:
      - level: 1
        score: 1
        text: |-
          Dev mở chat, paste code/tài liệu theo nhu cầu; mỗi người làm một kiểu.
      - level: 2
        score: 2
        text: |-
          Có file project-wide như AGENTS.md/CLAUDE.md/.cursorrules, nhưng agent thường đọc gần như toàn bộ.
      - level: 3
        score: 3
        text: |-
          Session start bằng context tối thiểu; agent truy hồi thêm tài liệu/code theo nhu cầu task.
      - level: 4
        score: 4
        text: |-
          Harness encode cách reset, handoff và truy vấn session history ngoài active context.
      - level: 5
        score: 5
        text: |-
          Context được quản lý như external state: cache, index, filter và load theo từng phase của task.

  - id: 8
    group: context
    weight: 2
    topic: "Context Engineering trong session dài"
    short: "Long context"
    text: |-
      Trong một session dài (nhiều giờ, nhiều task liên tiếp), team quản lý context của agent ra sao để chống context decay?
    measure: "Khả năng duy trì coherence khi session vượt khỏi một prompt hoặc một context window."
    note: |-
      Long-context model vẫn cần kỷ luật context: cái gì luôn ở trong prompt, cái gì truy hồi, cái gì được tóm tắt/handoff.
    options:
      - level: 1
        score: 1
        text: |-
          Cứ paste tiếp nội dung; khi agent lẫn lộn thì mở session mới và làm lại.
      - level: 2
        score: 2
        text: |-
          Dựa vào tính năng compaction/summarization có sẵn của tool, không có quy ước riêng.
      - level: 3
        score: 3
        text: |-
          Có quy ước progressive disclosure: context thường trú, context load-on-demand và context cần bỏ.
      - level: 4
        score: 4
        text: |-
          Có structured handoff định kỳ; session log lưu ngoài active context và truy vấn lại được.
      - level: 5
        score: 5
        text: |-
          State/session memory được virtualize; agent slice/filter log và context theo index thay vì giữ mọi thứ trong prompt.

  - id: 5
    group: context
    weight: 1
    topic: "Đóng gói kỹ năng thành Skills tái sử dụng"
    short: "Skills"
    text: |-
      Dev trong dự án có chủ động đóng gói kỹ năng, workflow hoặc tri thức dự án thành skill/tài sản tái sử dụng cho agent không?
    measure: "Mức độ codify tacit knowledge thành năng lực agent có thể tái sử dụng."
    note: |-
      Việc “có file skill” không quan trọng bằng việc skill được trigger đúng lúc, có owner và được cải tiến sau khi dùng.
    options:
      - level: 1
        score: 1
        text: |-
          Convention và hướng dẫn nằm rải rác trong đầu người hoặc trong một prompt dài.
      - level: 2
        score: 2
        text: |-
          Có docs/context file chung, nhưng chưa tách thành workflow/skill có trigger rõ.
      - level: 3
        score: 3
        text: |-
          Có một số skill/prompt/script tái sử dụng cho workflow lặp lại như test, review, release note.
      - level: 4
        score: 4
        text: |-
          Skills có owner, version, ví dụ dùng và script deterministic cho phần cần độ chính xác.
      - level: 5
        score: 5
        text: |-
          Có catalog skill cấp team/tổ chức; workflow tốt được PR hóa thành skill và đo hiệu quả sau khi rollout.

  - id: 3
    group: quality
    weight: 3
    topic: "Phát hiện và xử lý lỗi trong pipeline"
    short: "Defect handling"
    text: |-
      Khi agent hoàn thành một task nhưng output có vấn đề (sai logic, regression ẩn, drift), team phát hiện và xử lý như thế nào?
    measure: "Mức độ hệ thống hóa việc phát hiện silent failures và regression."
    note: |-
      Silent failure nguy hiểm vì tool có thể báo “thành công” trong khi hành vi sản phẩm đã sai.
    options:
      - level: 1
        score: 1
        text: |-
          Chỉ phát hiện khi build vỡ, exception nổ hoặc QA/user báo lỗi.
      - level: 2
        score: 2
        text: |-
          Có người chạy lại vài test case bằng tay khi nhớ hoặc khi task có vẻ rủi ro.
      - level: 3
        score: 3
        text: |-
          CI chạy test/baseline diff tự động cho PR do AI hỗ trợ; lỗi được ghi lại để học.
      - level: 4
        score: 4
        text: |-
          Có canary/golden scenarios, schema/output checks và triage rõ cho defect do AI tạo.
      - level: 5
        score: 5
        text: |-
          Agent có evaluator độc lập và retry có giới hạn; defect pattern tự biến thành regression check mới.

  - id: 4
    group: quality
    weight: 3
    topic: "Human-in-the-loop và phân loại cải thiện vs. bug"
    short: "HITL"
    text: |-
      Dự án áp dụng HITL thế nào, và khi agent đề xuất thay đổi, team phân biệt “cải thiện mới” với “bug cần fix” bằng cơ chế gì?
    measure: "Mức độ rõ ràng của quyền quyết định, review gate và triage."
    note: |-
      HITL không phải là bắt người bấm approve mọi thứ; HITL tốt là đưa đúng quyết định cho đúng người ở đúng mức rủi ro.
    options:
      - level: 1
        score: 1
        text: |-
          Không có HITL chính thức; dev tự copy/sửa/merge theo phán đoán cá nhân.
      - level: 2
        score: 2
        text: |-
          Mọi action đều hỏi human approve, nhưng review thường mang tính hình thức hoặc tùy từng PR, chưa có checklist/risk gate rõ.
      - level: 3
        score: 3
        text: |-
          Có phân loại risk: deploy/delete/security cần approve; thay đổi khác đi qua PR review và test.
      - level: 4
        score: 4
        text: |-
          Bug, enhancement, tech debt và agent failure có workflow/owner riêng; acceptance criteria quyết định phân loại.
      - level: 5
        score: 5
        text: |-
          HITL được calibrate bằng audit trail, sampling và quality metrics; human tập trung vào quyết định có rủi ro thật.

  - id: 10
    group: quality
    weight: 3
    topic: "Evaluation Framework (Evals)"
    short: "Evals"
    text: |-
      Dự án có cơ chế eval/regression test riêng cho output của AI agent không, và làm gì khi đổi model, prompt hoặc harness?
    measure: "Mức độ trưởng thành của eval-driven development cho AI output."
    note: |-
      Eval tốt thường kết hợp deterministic check (unit test, schema validation) với rubric-based judgment (LLM-as-judge, human rating) cho các vấn đề khó viết thành test truyền thống.
    options:
      - level: 1
        score: 1
        text: |-
          Dev tự đọc diff/log hoặc chạy build local; không có baseline lặp lại được.
      - level: 2
        score: 2
        text: |-
          Có golden set nhỏ nhưng kiểm tra còn thủ công và dễ bị bỏ qua khi gấp.
      - level: 3
        score: 3
        text: |-
          Eval suite chạy tự động trong sandbox, có baseline để so sánh prompt/model/harness.
      - level: 4
        score: 4
        text: |-
          Kết hợp deterministic checks và LLM-as-judge theo rubric đã hiệu chỉnh với đánh giá của human.
      - level: 5
        score: 5
        text: |-
          Production/runtime failures được đưa ngược thành eval case; mọi thay đổi lớn phải qua eval gate.

  - id: 6
    group: operations
    weight: 2
    topic: "Agent Harness — nhận thức và đo lường"
    short: "Harness"
    text: |-
      Team có biết về Agent Harness (tool routing, memory, sandbox, observability, policy) và đã đo lường để áp dụng cho dự án chưa?
    measure: "Mức độ trưởng thành của scaffolding quanh agent."
    note: |-
      Harness không nhất thiết phải tự xây từ đầu; quan trọng là team biết mình đang cấu hình, đo lường và kiểm soát lớp nào.
    options:
      - level: 1
        score: 1
        text: |-
          Dùng AI dạng chat/single-shot; không nghĩ đến harness hoặc scaffolding.
      - level: 2
        score: 2
        text: |-
          Dùng harness có sẵn của tool như Claude Code/Cursor, nhưng gần như chưa cấu hình hoặc đo lường.
      - level: 3
        score: 3
        text: |-
          Có cấu hình tool subset, system prompt/context riêng và logging task completed/failed.
      - level: 4
        score: 4
        text: |-
          Theo dõi success rate, intervention rate, latency và cost; thay đổi lớn được thử trên eval set.
      - level: 5
        score: 5
        text: |-
          Harness có versioning, eval gate và observability cho cả dev sessions lẫn agent workflow quan trọng.

  - id: 11
    group: operations
    weight: 2
    topic: "Cost & Token Observability"
    short: "Cost"
    text: |-
      Team theo dõi và quản lý token/cost của AI agent ở mức độ nào?
    measure: "Cost observability và khả năng quản trị chi phí theo workflow."
    note: |-
      License flat-rate không loại bỏ nhu cầu đo cost: latency, quota, vòng lặp lỗi và model routing vẫn là chi phí vận hành.
    options:
      - level: 1
        score: 1
        text: |-
          Không theo dõi; chỉ biết chi phí khi nhìn hóa đơn hoặc quota cuối kỳ.
      - level: 2
        score: 2
        text: |-
          Ước lượng bằng heuristic hoặc dashboard tổng; chưa gắn được với ticket/PR.
      - level: 3
        score: 3
        text: |-
          Log usage thực theo session/run: input, output, cached token, latency và model.
      - level: 4
        score: 4
        text: |-
          Cost được gắn với ticket/PR/feature/team để biết workflow nào đang đắt hoặc kém hiệu quả.
      - level: 5
        score: 5
        text: |-
          Có budget guardrail (giới hạn chi phí tự động) và model routing theo cost/quality/latency; outlier được alert hoặc chặn tự động.

  - id: 9
    group: operations
    weight: 3
    topic: "Permissions, Sandboxing và Runtime Security"
    short: "Security"
    text: |-
      Khi agent thực thi shell command, edit file, install dependency hoặc gọi tool, môi trường thực thi được cô lập và kiểm soát đến mức nào?
    measure: "Defense-in-depth của sandbox, permission và audit."
    note: |-
      Càng cho agent nhiều quyền, càng cần runtime cô lập, tool allowlist, secret handling và audit trail rõ.
    options:
      - level: 1
        score: 1
        text: |-
          Agent chạy với quyền gần như dev local/CI runner; secret và filesystem phụ thuộc kỷ luật cá nhân.
      - level: 2
        score: 2
        text: |-
          Có container hoặc môi trường riêng, nhưng network/secret/mount policy còn rộng.
      - level: 3
        score: 3
        text: |-
          Có tool allowlist, secret masking, network policy và filesystem scope rõ cho session agent.
      - level: 4
        score: 4
        text: |-
          Session quan trọng chạy trong môi trường ephemeral/cô lập; mọi tool call và file edit có audit trail.
      - level: 5
        score: 5
        text: |-
          Permission gắn với policy repo/CI; escalation cần approval và identity của agent được trace xuyên tool.

  - id: 7
    group: capability
    weight: 2
    topic: "Đảm bảo model đủ năng lực cho tác vụ"
    short: "Model fit"
    text: |-
      Team làm gì để đảm bảo model đang dùng đủ năng lực cho hầu hết tác vụ trong dự án?
    measure: "Mức độ ghép năng lực model với độ khó, rủi ro và chi phí của task."
    note: |-
      Model “mạnh nhất” không phải lúc nào cũng là lựa chọn tốt nhất; model phù hợp là model đạt chất lượng với cost/latency/risk hợp lý.
    options:
      - level: 1
        score: 1
        text: |-
          Dùng model mặc định của tool; quyết định dựa vào hype, demo hoặc thói quen.
      - level: 2
        score: 2
        text: |-
          Chọn model sau vài thử nghiệm nội bộ, nhưng ít revisit khi task hoặc model thay đổi.
      - level: 3
        score: 3
        text: |-
          Có bộ task nội bộ để so sánh candidate model trước khi đổi model/prompt quan trọng.
      - level: 4
        score: 4
        text: |-
          Chọn model theo loại task: coding, review, long-context, tool-use, visual hoặc phân tích requirement.
      - level: 5
        score: 5
        text: |-
          Có capability routing và fallback/escalation khi model nhẹ không đạt threshold chất lượng.

  - id: 12
    group: capability
    weight: 1
    topic: "Multi-agent & Subagent Orchestration"
    short: "Orchestration"
    text: |-
      Khi dự án dùng nhiều agent/subagent hoặc nhiều workflow AI song song, việc phối hợp được tổ chức ra sao?
    measure: "Mức độ kiểm soát phối hợp giữa các agent và quyền ghi vào codebase."
    note: |-
      Nhiều agent không phải lúc nào cũng đồng nghĩa với tốt hơn. Điều quan trọng là ownership, quyền ghi và verification rõ.
    options:
      - level: 1
        score: 1
        text: |-
          Một agent làm mọi thứ trong một luồng; planning, code và verification dễ lẫn vào nhau.
      - level: 2
        score: 2
        text: |-
          Nhiều agent cùng ghi song song vào codebase, dễ lệch style/kiến trúc và khó merge.
      - level: 3
        score: 3
        text: |-
          Một writer chính; agent khác chỉ hỗ trợ research/review/test hoặc làm việc trên phạm vi tách biệt rõ.
      - level: 4
        score: 4
        text: |-
          Có generator-verifier loop: agent tạo thay đổi và agent/context khác kiểm tra độc lập.
      - level: 5
        score: 5
        text: |-
          Manager/harness route task cho agent/model chuyên biệt, có guardrail escalation và conflict control.

  - id: 13
    group: capability
    weight: 1
    topic: "Team Enablement và chia sẻ tri thức"
    short: "Enablement"
    text: |-
      Khi một dev trong team tìm ra workflow AI hiệu quả, tri thức đó được lan tỏa và kiểm soát như thế nào?
    measure: "Khả năng lan tỏa thực hành tốt và kiểm soát cognitive debt."
    note: |-
      Throughput tăng không có nghĩa là hiểu biết chung tăng. Team vẫn cần shared theory of the program.
    options:
      - level: 1
        score: 1
        text: |-
          Mỗi dev tự cài tool và tự học; code AI tạo có thể được merge dù ít người hiểu.
      - level: 2
        score: 2
        text: |-
          Chia sẻ qua chat/wiki không chính thức; nội dung nhanh lỗi thời và khó biết workflow nào hiệu quả.
      - level: 3
        score: 3
        text: |-
          Có rule: human phải hiểu PR do AI tạo; workflow tốt được ghi lại trong docs/checklist.
      - level: 4
        score: 4
        text: |-
          Có cơ chế định kỳ review workflow AI, cập nhật context/skill và loại bỏ thực hành làm tăng việc sửa/làm lại.
      - level: 5
        score: 5
        text: |-
          Knowledge map/skill catalog được cập nhật từ commit, incident và review; onboarding AI workflow gần như có hệ thống.

translations:
  en:
    survey:
      title: "AI Integration Maturity Survey for Software Projects"
      disclaimer: |-
        Survey results are for reference and relative positioning of AI integration maturity in a software project. This is not a certification, independent audit, or absolute conclusion about team capability. The criteria are synthesized from current practice and AI-assisted analysis, so they should be read together with project context and open responses.
      methodology:
        label: "Methodology and survey design basis"
        title: "AI Maturity Research Strategy Revision"
        url: "https://github.com/thienannguyen-cv/AI-maturity-survey/blob/main/AI%20Maturity%20Research%20Strategy%20Revision.docx"
    scoring:
      not_applicable:
        label: "Not applicable in this project"
      note: |-
        Each question score = selected option score * question weight. N/A adds no points and is excluded from the applicable maximum score.
        Weight 3 is used for foundational or high-risk capabilities; weight 2 for important operational capabilities; weight 1 for advanced or supporting capabilities.
      weight_guidance:
        "3":
          label: "Foundational / high-risk"
          description: "Defect handling, HITL, evals, sandbox/security."
        "2":
          label: "Important operations"
          description: "Planning, context, harness, cost, model fit."
        "1":
          label: "Advanced / supporting"
          description: "Skills, multi-agent orchestration, team enablement."
    open_response:
      label: "Additional context (optional)"
      placeholder: "For example: current artifacts, how the team works, why you chose this level, or what you are unsure about."
    survey_feedback:
      title: "Improvement feedback"
      eyebrow: "Final section · not scored"
      description: |-
        If any part of the survey feels inaccurate, needs adjustment, or should include additional criteria or clearer wording, please write it here. This feedback helps improve the survey quality in future rounds.
      placeholder: "For example: Which question was unclear? Is any criterion missing? Are the weights reasonable? Does any option fail to reflect your project reality?"
    demographics:
      a1:
        label: "Which role is closest to your responsibility in this project?"
        options:
          - "Producer / Project Producer"
          - "Product Owner / Product Manager"
          - "Engineering Manager / Delivery Manager"
          - "Tech Lead also coordinating delivery"
          - "Other role with project delivery responsibility"
      a2:
        label: "What is the size of the project team, including regular AI-tool users?"
        options:
          - "1-3 people"
          - "4-10 people"
          - "11-30 people"
          - ">30 people"
      a3:
        label: "How long has the project integrated AI into the delivery workflow?"
        options:
          - "<3 months"
          - "3-12 months"
          - "1-2 years"
          - ">2 years"
      a4:
        label: "Which project risk profile is closest?"
        options:
          - "Internal tool or prototype, low risk"
          - "Customer-facing product, medium risk"
          - "System involving sensitive data, finance, security, or legal risk"
          - "Core platform/service depended on by multiple teams"
          - "Not sure"
    groups:
      planning:
        name: "Delivery Planning & Scope"
        short: "Planning"
        description: "How producers and teams make AI a plannable variable instead of assuming a generic speed boost."
      context:
        name: "Context & Reusable Knowledge"
        short: "Context"
        description: "How the team provides context, maintains coherence, and packages knowledge so agents work reliably."
      quality:
        name: "Quality, HITL & Evals"
        short: "Quality"
        description: "How the team detects defects, assigns human decision rights, and verifies AI output repeatedly."
      operations:
        name: "Harness, Operations & Governance"
        short: "Operations"
        description: "How the team measures, isolates runtime, manages cost, and operates agents as a system."
      capability:
        name: "Agent Capability & Team Enablement"
        short: "Capability"
        description: "How the team chooses models, coordinates agents, and spreads AI capability across the organization."
    tiers:
      Ad-hoc:
        name: "Ad-hoc"
        recommendation: |-
          AI is mainly used as individual effort. Prioritize standardizing task handoff, PR review, minimum sandboxing, and a small test/eval set.
      Repeatable:
        name: "Repeatable"
        recommendation: |-
          Repeatable patterns exist but still depend heavily on individuals. Next, align on definition of ready/done, basic logging, and a HITL checklist.
      Defined:
        name: "Defined"
        recommendation: |-
          The process is reasonably clear. Next, add quantitative measurement at critical points: evals, defect escape, intervention rate, and cost.
      Managed:
        name: "Managed"
        recommendation: |-
          The team manages AI as part of the delivery system. Next, increase automation in feedback loops and use data to control risk.
      Optimizing:
        name: "Optimizing"
        recommendation: |-
          The team operates AI at a highly mature level. Focus on sustainability, organization-scale standardization, and continuous improvement based on evals and telemetry.
    questions:
      "1":
        topic: "Phase 1 effort estimation"
        short: "Estimation"
        text: |-
          When the project enters its first phase (discovery, POC, setup, initial architecture), how does your team estimate effort when AI participates in the coding workflow?
        measure: "How well AI is integrated into sizing and agile planning."
        note: |-
          Maturity is not simply saying "AI makes it faster"; it is knowing what becomes faster and what creates extra review, context, or eval work.
        options:
          - |-
            Estimates are almost the same as traditional projects; AI is not treated as a separate variable.
          - |-
            Effort is reduced for tasks that "seem AI-suitable", mostly based on senior/dev lead intuition.
          - |-
            A sizing template considers context, change scope, tests to run, and task reasoning level.
          - |-
            The team logs agent time, fixes/rework after review, and human review time, then uses the data to calibrate estimates.
          - |-
            A pipeline or dashboard forecasts effort/risk from ticket history, context completeness, and repo complexity.
      "14":
        topic: "AI-oriented scope slicing"
        short: "Task slicing"
        text: |-
          When receiving a new feature/epic, how do the producer and team split work so AI agents can contribute effectively without increasing rework?
        measure: "Ability to turn product scope into AI-suitable work slices."
        note: |-
          AI usually works better on tasks with clear boundaries, clear acceptance criteria, and clear verification.
        options:
          - |-
            Tickets are split as before; each developer decides whether to ask AI.
          - |-
            Some tickets are labeled "AI-suitable", but selection criteria are still intuitive.
          - |-
            A checklist defines AI-suitable tasks: small scope, clear output, runnable test/review path.
          - |-
            The backlog is routed clearly: agent draft, human design, pair-with-agent, or human-only based on risk.
          - |-
            A system suggests task slicing and confidence based on the repo, rework history, test/check coverage around the area, and risk; the producer reviews before sprint planning.
      "15":
        topic: "Readiness before agent work"
        short: "Readiness"
        text: |-
          Before a ticket is assigned to a developer using an agent, what minimum information must the ticket contain to reduce misunderstanding and rework during review/verification?
        measure: "Maturity of definition of ready for AI-assisted delivery."
        note: |-
          A good prompt cannot replace an ambiguous ticket. Readiness is a delivery responsibility, not only a developer prompting skill.
        options:
          - |-
            The agent receives a short prompt or verbal description; acceptance criteria and verification path are missing.
          - |-
            The ticket/doc link exists, but context depends on the developer remembering and adding it manually.
          - |-
            Standards include acceptance criteria, relevant modules, test command, and important constraints.
          - |-
            Each run starts from a task packet: goal, context, risks, reviewer/rollback owner, and verification command.
          - |-
            A ticket readiness score is checked automatically; the agent is blocked when critical information or test baseline is missing.
      "2":
        topic: "Starting an AI session"
        short: "Session start"
        text: |-
          When a developer starts a coding session with an AI agent (Claude Code, Cursor, Copilot, ...), how is the session initialized?
        measure: "Maturity of context engineering during priming."
        note: |-
          A shared context file is useful, but a file that is too long or always fully loaded can make the agent less focused.
        options:
          - |-
            The developer opens chat and pastes code/docs as needed; everyone works differently.
          - |-
            A project-wide file exists (AGENTS.md/CLAUDE.md/.cursorrules), but the agent usually reads almost everything.
          - |-
            The session starts with minimum context; the agent retrieves additional docs/code as the task requires.
          - |-
            The harness encodes reset, handoff, and session history lookup outside the active context.
          - |-
            Context is managed as external state: cache, index, filter, and phase-based loading.
      "8":
        topic: "Context engineering in long sessions"
        short: "Long context"
        text: |-
          In a long session (many hours or several consecutive tasks), how does the team manage agent context to prevent context decay?
        measure: "Ability to maintain coherence beyond a single prompt or context window."
        note: |-
          Long-context models still need context discipline: what stays in the prompt, what is retrieved, and what is summarized or handed off.
        options:
          - |-
            The team keeps pasting more content; when the agent gets confused, they open a new session and redo work.
          - |-
            The team relies on built-in compaction/summarization from the tool without its own convention.
          - |-
            Progressive disclosure is defined: resident context, load-on-demand context, and context to drop.
          - |-
            Structured handoff happens regularly; session logs are stored outside active context and can be queried.
          - |-
            State/session memory is virtualized; the agent slices and filters logs/context by index instead of keeping everything in the prompt.
      "5":
        topic: "Packaging reusable agent skills"
        short: "Skills"
        text: |-
          Do developers proactively package skills, workflows, or project knowledge into reusable assets for agents?
        measure: "How well tacit knowledge is codified into reusable agent capability."
        note: |-
          Having a "skill file" matters less than whether the skill triggers at the right time, has an owner, and improves after use.
        options:
          - |-
            Conventions and guidance are scattered in people's heads or in one long prompt.
          - |-
            Shared docs/context files exist, but they are not separated into workflows/skills with clear triggers.
          - |-
            Some reusable skills/prompts/scripts exist for repeated workflows such as testing, review, or release notes.
          - |-
            Skills have owners, versions, examples, and deterministic scripts for precision-critical parts.
          - |-
            A team/organization skill catalog exists; good workflows are turned into skill PRs and measured after rollout.
      "3":
        topic: "Detecting and handling defects in the pipeline"
        short: "Defect handling"
        text: |-
          When an agent completes a task but the output has issues (wrong logic, hidden regression, drift), how does the team detect and handle it?
        measure: "How systematically the team detects silent failures and regression."
        note: |-
          Silent failure is dangerous because the tool may report success while product behavior is already wrong.
        options:
          - |-
            Problems are found only when the build breaks, an exception appears, or QA/users report a bug.
          - |-
            Someone manually reruns a few test cases when they remember or when the task feels risky.
          - |-
            CI runs tests/baseline diffs automatically for AI-assisted PRs; defects are recorded for learning.
          - |-
            Canary/golden scenarios, schema/output checks, and clear triage exist for AI-created defects.
          - |-
            An independent evaluator and bounded retry loop exist; defect patterns automatically become new regression checks.
      "4":
        topic: "Human-in-the-loop and improvement vs. bug triage"
        short: "HITL"
        text: |-
          How does the project apply HITL, and when an agent proposes a change, what mechanism separates a "new improvement" from a "bug to fix"?
        measure: "Clarity of decision rights, review gates, and triage."
        note: |-
          HITL does not mean humans approve everything. Good HITL routes the right decision to the right person at the right risk level.
        options:
          - |-
            There is no formal HITL; developers copy/fix/merge based on personal judgment.
          - |-
            Every action asks for human approval, but review is often click-through or ad-hoc in PRs.
          - |-
            Risk is classified: deploy/delete/security require approval; other changes go through PR review and tests.
          - |-
            Bugs, enhancements, tech debt, and agent failures have separate workflows/owners; acceptance criteria drive classification.
          - |-
            HITL is calibrated with audit trails, sampling, and quality metrics; humans focus on genuinely risky decisions.
      "10":
        topic: "Evaluation framework (evals)"
        short: "Evals"
        text: |-
          Does the project have its own eval/regression mechanism for AI-agent output, and what happens when the model, prompt, or harness changes?
        measure: "Maturity of eval-driven development for AI output."
        note: |-
          Good evals often combine deterministic checks (unit tests, schema validation) with rubric-based judgment (LLM-as-judge, human rating) for issues that are hard to express as traditional tests.
        options:
          - |-
            Developers read diffs/logs or run local builds; no repeatable baseline exists.
          - |-
            A small golden set exists, but checking is manual and often skipped under pressure.
          - |-
            An eval suite runs automatically in a sandbox, with baselines for comparing prompt/model/harness changes.
          - |-
            Deterministic checks and LLM-as-judge are combined using a rubric calibrated against human assessment.
          - |-
            Production/runtime failures feed back into eval cases; every major change must pass an eval gate.
      "6":
        topic: "Agent harness awareness and measurement"
        short: "Harness"
        text: |-
          Does the team understand Agent Harnesses (tool routing, memory, sandbox, observability, policy), and has it measured what the project needs before adopting them?
        measure: "Maturity of scaffolding around agents."
        note: |-
          The team does not have to build a harness from scratch; what matters is knowing which layers are configured, measured, and controlled.
        options:
          - |-
            AI is used as chat/single-shot; the team does not think about harnesses or scaffolding.
          - |-
            The team uses the built-in harness from tools like Claude Code/Cursor, but with little configuration or measurement.
          - |-
            Tool subsets, system prompt/project context, and task completed/failed logging are configured.
          - |-
            Success rate, intervention rate, latency, and cost are tracked; major changes are tested on an eval set.
          - |-
            The harness has versioning, eval gates, and observability for both dev sessions and important agent workflows.
      "11":
        topic: "Cost & token observability"
        short: "Cost"
        text: |-
          To what extent does the team track and manage AI-agent token/cost usage?
        measure: "Cost observability and ability to govern cost by workflow."
        note: |-
          Flat-rate licenses do not remove the need to measure cost: latency, quota, error loops, and model routing are still operational costs.
        options:
          - |-
            Nothing is tracked; cost is only noticed in invoices or quota reports at the end of the period.
          - |-
            Cost is estimated with heuristics or aggregate dashboards, but not tied to tickets/PRs.
          - |-
            Real usage is logged by session/run: input, output, cached tokens, latency, and model.
          - |-
            Cost is tied to ticket/PR/feature/team so expensive or inefficient workflows can be identified.
          - |-
            Budget guardrails and model routing by cost/quality/latency exist; outliers are alerted or blocked automatically.
      "9":
        topic: "Permissions, sandboxing, and runtime security"
        short: "Security"
        text: |-
          When an agent runs shell commands, edits files, installs dependencies, or calls tools, how isolated and controlled is the execution environment?
        measure: "Defense-in-depth for sandboxing, permissions, and audit."
        note: |-
          The more power an agent has, the more it needs runtime isolation, tool allowlists, secret handling, and clear audit trails.
        options:
          - |-
            The agent runs with almost the same access as a local developer/CI runner; secrets and filesystem safety depend on personal discipline.
          - |-
            A container or separate environment exists, but network/secret/mount policies are still broad.
          - |-
            Tool allowlists, secret masking, network policy, and filesystem scope are defined for agent sessions.
          - |-
            Important sessions run in ephemeral/isolated environments; every tool call and file edit has an audit trail.
          - |-
            Permissions are tied to repo/CI policy; escalation requires approval and the agent identity is traceable across tools.
      "7":
        topic: "Ensuring the model is fit for the task"
        short: "Model fit"
        text: |-
          What does the team do to ensure the model being used is capable enough for most project tasks?
        measure: "How well model capability is matched to task difficulty, risk, and cost."
        note: |-
          The "strongest" model is not always the best choice. A fit-for-purpose model achieves quality at reasonable cost, latency, and risk.
        options:
          - |-
            The default tool model is used; decisions are based on hype, demos, or habit.
          - |-
            A model is chosen after a few internal trials, but rarely revisited when tasks or models change.
          - |-
            Internal tasks are used to compare candidate models before important model/prompt changes.
          - |-
            Models are selected by task type: coding, review, long-context, tool use, visual, or requirement analysis.
          - |-
            Capability routing and fallback/escalation exist when a lighter model fails to meet the quality threshold.
      "12":
        topic: "Multi-agent & subagent orchestration"
        short: "Orchestration"
        text: |-
          When the project uses multiple agents/subagents or parallel AI workflows, how is coordination organized?
        measure: "Control over coordination between agents and write access to the codebase."
        note: |-
          More agents does not always mean better outcomes. Ownership, write boundaries, and verification matter most.
        options:
          - |-
            One agent does everything in one flow; planning, coding, and verification are easily mixed together.
          - |-
            Multiple agents write to the codebase in parallel, causing style/architecture drift and merge difficulty.
          - |-
            One primary writer exists; other agents support research/review/test or work in clearly separated scopes.
          - |-
            A generator-verifier loop exists: one agent creates changes and another agent/context checks independently.
          - |-
            A manager/harness routes tasks to specialized agents/models, with escalation guardrails and conflict control.
      "13":
        topic: "Team enablement and knowledge sharing"
        short: "Enablement"
        text: |-
          When a developer finds an effective AI workflow, how is that knowledge shared and controlled across the team?
        measure: "Ability to spread good practice and control cognitive debt."
        note: |-
          Higher throughput does not automatically mean shared understanding has improved. The team still needs a shared theory of the program.
        options:
          - |-
            Each developer installs tools and learns individually; AI-generated code may be merged even when few people understand it.
          - |-
            Sharing happens through informal chat/wiki; content becomes stale quickly and effective workflows are hard to identify.
          - |-
            A rule requires humans to understand AI-generated PRs; effective workflows are documented in docs/checklists.
          - |-
            AI workflows are reviewed periodically; context/skills are updated and practices that increase rework are removed.
          - |-
            A knowledge map/skill catalog is updated from commits, incidents, and reviews; AI workflow onboarding is close to systematic.
