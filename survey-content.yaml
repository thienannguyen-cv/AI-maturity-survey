# AI Integration Maturity Survey — content source of truth.
# Edit this file to change question text, options, tiers, weights, or notes.
# The web app reads this YAML at runtime; refresh to see changes.

survey:
  version: "1.1"
  title: "Độ trưởng thành tích hợp AI trong dự án phần mềm"

scoring:
  scale_max: 5
  default_weight: 1
  not_applicable:
    label: "Chưa áp dụng trong dự án"
    handling: "exclude_from_total_and_max"
  tier_metric: "percent_of_applicable_weighted_score"
  note: |-
    Điểm mỗi câu = score của option * weight của câu. N/A không cộng điểm và không tính vào điểm tối đa áp dụng.
    Weight 3 dùng cho năng lực nền tảng/rủi ro cao; weight 2 dùng cho năng lực vận hành quan trọng; weight 1 dùng cho năng lực nâng cao hoặc bổ trợ.

open_response:
  enabled: true
  label: "Bổ sung bối cảnh (tuỳ chọn)"
  placeholder: "Ví dụ: artifact đang có, cách team đang làm, lý do bạn chọn mức này, hoặc điểm bạn còn phân vân."

demographics:
  - id: a1
    label: "Vai trò gần nhất của bạn trong dự án này là gì?"
    options:
      - "Producer / Project Producer"
      - "Product Owner / Product Manager"
      - "Engineering Manager / Delivery Manager"
      - "Tech Lead đang kiêm điều phối delivery"
      - "Khác nhưng có trách nhiệm điều phối dự án"
  - id: a2
    label: "Quy mô team đang tham gia dự án (kể cả người dùng AI tools thường xuyên)"
    options:
      - "1–3 người"
      - "4–10 người"
      - "11–30 người"
      - ">30 người"
  - id: a3
    label: "Dự án đã tích hợp AI vào quy trình delivery bao lâu?"
    options:
      - "<3 tháng"
      - "3–12 tháng"
      - "1–2 năm"
      - ">2 năm"
  - id: a4
    label: "Mức độ rủi ro của domain dự án gần nhất với lựa chọn nào?"
    options:
      - "Internal tool hoặc prototype, rủi ro thấp"
      - "Sản phẩm khách hàng dùng, rủi ro trung bình"
      - "Hệ thống ảnh hưởng dữ liệu nhạy cảm, tài chính, bảo mật hoặc pháp lý"
      - "Nền tảng/core service nhiều team phụ thuộc"
      - "Không rõ"

groups:
  - id: planning
    name: "Lập kế hoạch delivery & phạm vi"
    short: "Planning"
    description: "Cách producer và team biến AI thành một biến số có thể lập kế hoạch, thay vì chỉ kỳ vọng tốc độ tăng chung chung."
  - id: context
    name: "Context & tri thức tái sử dụng"
    short: "Context"
    description: "Cách team cung cấp context, duy trì coherence và đóng gói tri thức để agent làm việc ổn định."
  - id: quality
    name: "Chất lượng, HITL & evals"
    short: "Quality"
    description: "Cách team phát hiện lỗi, phân quyền cho human, và kiểm chứng output AI một cách lặp lại."
  - id: operations
    name: "Harness, vận hành & governance"
    short: "Operations"
    description: "Cách team đo lường, cô lập runtime, quản lý chi phí và vận hành agent như một hệ thống."
  - id: capability
    name: "Năng lực agent & enablement đội ngũ"
    short: "Capability"
    description: "Cách team chọn model, phối hợp agent và lan tỏa năng lực AI trong tổ chức."

tiers:
  # Boundaries derived from original spec: L1.0/1.8/2.7/3.6/4.4/5.0 mapped
  # to weighted-percentage (score/max). E.g. all L1 answers => 20%, all L5 => 100%.
  - min: 0
    max: 36
    name: "Ad-hoc"
    recommendation: |-
      AI chủ yếu đang được dùng như nỗ lực cá nhân. Ưu tiên chuẩn hóa cách giao việc, PR review, sandbox tối thiểu và một bộ test/eval nhỏ.
  - min: 37
    max: 54
    name: "Repeatable"
    recommendation: |-
      Đã có pattern lặp lại nhưng còn phụ thuộc cá nhân. Bước tiếp theo là thống nhất definition of ready/done, logging cơ bản và checklist HITL.
  - min: 55
    max: 72
    name: "Defined"
    recommendation: |-
      Quy trình đã tương đối rõ. Bước tiếp theo là đưa đo lường định lượng vào các điểm quan trọng: evals, defect escape, intervention rate và cost.
  - min: 73
    max: 88
    name: "Managed"
    recommendation: |-
      Team đã quản lý AI như một phần của delivery system. Bước tiếp theo là tăng độ tự động của feedback loop và kiểm soát rủi ro theo dữ liệu.
  - min: 89
    max: 100
    name: "Optimizing"
    recommendation: |-
      Team vận hành AI ở mức rất trưởng thành. Tập trung vào sustainability, chuẩn hóa ở quy mô tổ chức và cải tiến liên tục dựa trên eval/telemetry.

questions:
  - id: 1
    group: planning
    weight: 2
    topic: "Ước lượng công sức Phase 1"
    short: "Ước lượng"
    text: |-
      Khi dự án bước vào pha đầu tiên (discovery, POC, setup, kiến trúc khởi tạo), team của bạn ước lượng công sức như thế nào trong bối cảnh AI tham gia vào quy trình code?
    measure: "Mức độ tích hợp yếu tố AI vào sizing/agile planning."
    note: |-
      Dấu hiệu trưởng thành không phải là “AI làm nhanh hơn”, mà là team biết phần nào nhanh hơn, phần nào phát sinh thêm review/context/eval.
    options:
      - level: 1
        score: 1
        text: |-
          Estimate gần giống dự án truyền thống; AI không được tính như biến số riêng.
      - level: 2
        score: 2
        text: |-
          Giảm effort cho task “AI có vẻ làm được”, chủ yếu dựa vào cảm tính của senior/dev lead.
      - level: 3
        score: 3
        text: |-
          Có template sizing xét context, phạm vi thay đổi, test cần chạy và mức reasoning của task.
      - level: 4
        score: 4
        text: |-
          Log thời gian agent, số vòng sửa, thời gian human review và dùng dữ liệu đó để hiệu chuẩn estimate.
      - level: 5
        score: 5
        text: |-
          Có pipeline hoặc dashboard dự báo effort/risk từ lịch sử ticket, độ đầy đủ context và complexity của repo.

  - id: 14
    group: planning
    weight: 2
    topic: "Phân rã phạm vi cho AI"
    short: "Task slicing"
    text: |-
      Khi nhận một feature/epic mới, producer và team phân rã công việc như thế nào để AI agent tham gia hiệu quả mà không làm tăng rework?
    measure: "Khả năng biến scope sản phẩm thành các lát công việc phù hợp với AI."
    note: |-
      AI thường hiệu quả hơn với task có boundary rõ, acceptance criteria rõ và cách kiểm chứng rõ.
    options:
      - level: 1
        score: 1
        text: |-
          Chia ticket như trước đây; dev tự quyết định có hỏi AI hay không.
      - level: 2
        score: 2
        text: |-
          Có gắn nhãn vài ticket “AI làm được”, nhưng tiêu chí chọn còn cảm tính.
      - level: 3
        score: 3
        text: |-
          Có checklist chọn task AI-friendly: boundary nhỏ, đầu ra rõ, test/review có thể chạy được.
      - level: 4
        score: 4
        text: |-
          Backlog phân luồng rõ: agent draft, human design, pair-with-agent, hoặc human-only theo rủi ro.
      - level: 5
        score: 5
        text: |-
          Hệ thống đề xuất task slicing và confidence dựa trên repo, lịch sử rework và coverage; producer review trước sprint.

  - id: 15
    group: planning
    weight: 2
    topic: "Readiness trước khi giao việc cho agent"
    short: "Readiness"
    text: |-
      Trước khi một agent bắt đầu làm ticket, team yêu cầu những thông tin tối thiểu nào để giảm hiểu sai và vòng sửa?
    measure: "Mức độ trưởng thành của definition of ready cho AI-assisted delivery."
    note: |-
      Prompt tốt không thay thế được một ticket mơ hồ. Readiness là trách nhiệm delivery, không chỉ là kỹ năng prompt của dev.
    options:
      - level: 1
        score: 1
        text: |-
          Agent nhận prompt ngắn hoặc mô tả miệng; thiếu acceptance criteria và cách kiểm chứng.
      - level: 2
        score: 2
        text: |-
          Có link ticket/tài liệu, nhưng context phụ thuộc dev tự nhớ và tự bổ sung.
      - level: 3
        score: 3
        text: |-
          Definition of ready gồm acceptance criteria, module liên quan, test command và constraint quan trọng.
      - level: 4
        score: 4
        text: |-
          Mỗi run bắt đầu từ task packet: mục tiêu, context, rủi ro, rollback/review owner và lệnh verify.
      - level: 5
        score: 5
        text: |-
          Readiness score được kiểm tra tự động; agent bị chặn khi thiếu thông tin quan trọng hoặc test baseline.

  - id: 2
    group: context
    weight: 2
    topic: "Khởi tạo session với AI"
    short: "Session start"
    text: |-
      Khi một dev bắt đầu một session code với AI agent (Claude Code, Cursor, Copilot, ...), session đó được khởi tạo như thế nào?
    measure: "Mức độ trưởng thành của context engineering ở giai đoạn priming."
    note: |-
      Có một file context chung là tốt, nhưng file quá dài hoặc luôn được load toàn bộ có thể làm agent kém tập trung.
    options:
      - level: 1
        score: 1
        text: |-
          Dev mở chat, paste code/tài liệu theo nhu cầu; mỗi người làm một kiểu.
      - level: 2
        score: 2
        text: |-
          Có file project-wide như AGENTS.md/CLAUDE.md/.cursorrules, nhưng agent thường đọc gần như toàn bộ.
      - level: 3
        score: 3
        text: |-
          Session start bằng context tối thiểu; agent truy hồi thêm tài liệu/code theo nhu cầu task.
      - level: 4
        score: 4
        text: |-
          Harness encode cách reset, handoff và truy vấn session history ngoài active context.
      - level: 5
        score: 5
        text: |-
          Context được quản lý như external state: cache, index, filter và load theo từng phase của task.

  - id: 8
    group: context
    weight: 2
    topic: "Context Engineering trong session dài"
    short: "Long context"
    text: |-
      Trong một session dài (nhiều giờ, nhiều task liên tiếp), team quản lý context của agent ra sao để chống context decay?
    measure: "Khả năng duy trì coherence khi session vượt khỏi một prompt hoặc một context window."
    note: |-
      Long-context model vẫn cần kỷ luật context: cái gì luôn ở trong prompt, cái gì truy hồi, cái gì được tóm tắt/handoff.
    options:
      - level: 1
        score: 1
        text: |-
          Cứ paste tiếp nội dung; khi agent lẫn lộn thì mở session mới và làm lại.
      - level: 2
        score: 2
        text: |-
          Dựa vào tính năng compaction/summarization có sẵn của tool, không có quy ước riêng.
      - level: 3
        score: 3
        text: |-
          Có quy ước progressive disclosure: context thường trú, context load-on-demand và context cần bỏ.
      - level: 4
        score: 4
        text: |-
          Có structured handoff định kỳ; session log lưu ngoài active context và truy vấn lại được.
      - level: 5
        score: 5
        text: |-
          State/session memory được virtualize; agent slice/filter log và context theo index thay vì giữ mọi thứ trong prompt.

  - id: 5
    group: context
    weight: 1
    topic: "Đóng gói kỹ năng thành Skills tái sử dụng"
    short: "Skills"
    text: |-
      Dev trong dự án có chủ động đóng gói kỹ năng, workflow hoặc tri thức dự án thành skill/tài sản tái sử dụng cho agent không?
    measure: "Mức độ codify tacit knowledge thành năng lực agent có thể tái sử dụng."
    note: |-
      Điểm cao không chỉ là “có file skill”, mà là skill được trigger đúng lúc, có owner và được cải tiến sau khi dùng.
    options:
      - level: 1
        score: 1
        text: |-
          Convention và hướng dẫn nằm rải rác trong đầu người hoặc trong một prompt dài.
      - level: 2
        score: 2
        text: |-
          Có docs/context file chung, nhưng chưa tách thành workflow/skill có trigger rõ.
      - level: 3
        score: 3
        text: |-
          Có một số skill/prompt/script tái sử dụng cho workflow lặp lại như test, review, release note.
      - level: 4
        score: 4
        text: |-
          Skills có owner, version, ví dụ dùng và script deterministic cho phần cần độ chính xác.
      - level: 5
        score: 5
        text: |-
          Có catalog skill cấp team/tổ chức; workflow tốt được PR hóa thành skill và đo hiệu quả sau khi rollout.

  - id: 3
    group: quality
    weight: 3
    topic: "Phát hiện và xử lý lỗi trong pipeline"
    short: "Defect handling"
    text: |-
      Khi agent hoàn thành một task nhưng output có vấn đề (sai logic, regression ẩn, drift), team phát hiện và xử lý như thế nào?
    measure: "Mức độ hệ thống hóa việc phát hiện silent failures và regression."
    note: |-
      Silent failure nguy hiểm vì tool có thể báo “thành công” trong khi hành vi sản phẩm đã sai.
    options:
      - level: 1
        score: 1
        text: |-
          Chỉ phát hiện khi build vỡ, exception nổ hoặc QA/user báo lỗi.
      - level: 2
        score: 2
        text: |-
          Có người chạy lại vài test case bằng tay khi nhớ hoặc khi task có vẻ rủi ro.
      - level: 3
        score: 3
        text: |-
          CI chạy test/baseline diff tự động cho PR do AI hỗ trợ; lỗi được ghi lại để học.
      - level: 4
        score: 4
        text: |-
          Có canary/golden scenarios, schema/output checks và triage rõ cho defect do AI tạo.
      - level: 5
        score: 5
        text: |-
          Agent có evaluator độc lập và retry có giới hạn; defect pattern tự biến thành regression check mới.

  - id: 4
    group: quality
    weight: 3
    topic: "Human-in-the-loop và phân loại cải thiện vs. bug"
    short: "HITL"
    text: |-
      Dự án áp dụng HITL thế nào, và khi agent đề xuất thay đổi, team phân biệt “cải thiện mới” với “bug cần fix” bằng cơ chế gì?
    measure: "Mức độ rõ ràng của quyền quyết định, review gate và triage."
    note: |-
      HITL không phải là bắt người bấm approve mọi thứ; HITL tốt là đưa đúng quyết định cho đúng người ở đúng mức rủi ro.
    options:
      - level: 1
        score: 1
        text: |-
          Không có HITL chính thức; dev tự copy/sửa/merge theo phán đoán cá nhân.
      - level: 2
        score: 2
        text: |-
          Mọi action đều hỏi human approve, nhưng review thường là click-through hoặc ad-hoc trong PR.
      - level: 3
        score: 3
        text: |-
          Có phân loại risk: deploy/delete/security cần approve; thay đổi khác đi qua PR review và test.
      - level: 4
        score: 4
        text: |-
          Bug, enhancement, tech debt và agent failure có workflow/owner riêng; acceptance criteria quyết định phân loại.
      - level: 5
        score: 5
        text: |-
          HITL được calibrate bằng audit trail, sampling và quality metrics; human tập trung vào quyết định có rủi ro thật.

  - id: 10
    group: quality
    weight: 3
    topic: "Evaluation Framework (Evals)"
    short: "Evals"
    text: |-
      Dự án có cơ chế eval/regression test riêng cho output của AI agent không, và làm gì khi đổi model, prompt hoặc harness?
    measure: "Mức độ trưởng thành của eval-driven development cho AI output."
    note: |-
      Về việc áp dụng các eval tốt, kết hợp deterministic check và việc đánh giá theo rubric cho các vấn đề khó viết thành test.
    options:
      - level: 1
        score: 1
        text: |-
          Dev tự đọc diff/log hoặc chạy build local; không có baseline lặp lại được.
      - level: 2
        score: 2
        text: |-
          Có golden set nhỏ nhưng kiểm tra còn thủ công và dễ bị bỏ qua khi gấp.
      - level: 3
        score: 3
        text: |-
          Eval suite chạy tự động trong sandbox, có baseline để so sánh prompt/model/harness.
      - level: 4
        score: 4
        text: |-
          Kết hợp deterministic checks và LLM-as-judge theo rubric đã hiệu chỉnh với đánh giá của human.
      - level: 5
        score: 5
        text: |-
          Production/runtime failures được đưa ngược thành eval case; mọi thay đổi lớn phải qua eval gate.

  - id: 6
    group: operations
    weight: 2
    topic: "Agent Harness — nhận thức và đo lường"
    short: "Harness"
    text: |-
      Team có biết về Agent Harness (tool routing, memory, sandbox, observability, policy) và đã đo lường để áp dụng cho dự án chưa?
    measure: "Mức độ trưởng thành của scaffolding quanh agent."
    note: |-
      Harness không nhất thiết phải tự xây từ đầu; quan trọng là team biết mình đang cấu hình, đo lường và kiểm soát lớp nào.
    options:
      - level: 1
        score: 1
        text: |-
          Dùng AI dạng chat/single-shot; không nghĩ đến harness hoặc scaffolding.
      - level: 2
        score: 2
        text: |-
          Dùng harness có sẵn của tool như Claude Code/Cursor, nhưng gần như chưa cấu hình hoặc đo lường.
      - level: 3
        score: 3
        text: |-
          Có cấu hình tool subset, system prompt/context riêng và logging task completed/failed.
      - level: 4
        score: 4
        text: |-
          Theo dõi success rate, intervention rate, latency và cost; thay đổi lớn được thử trên eval set.
      - level: 5
        score: 5
        text: |-
          Harness có versioning, eval gate và observability cho cả dev sessions lẫn agent workflow quan trọng.

  - id: 11
    group: operations
    weight: 2
    topic: "Cost & Token Observability"
    short: "Cost"
    text: |-
      Team theo dõi và quản lý token/cost của AI agent ở mức độ nào?
    measure: "Cost observability và khả năng quản trị chi phí theo workflow."
    note: |-
      License flat-rate không loại bỏ nhu cầu đo cost: latency, quota, vòng lặp lỗi và model routing vẫn là chi phí vận hành.
    options:
      - level: 1
        score: 1
        text: |-
          Không theo dõi; chỉ biết chi phí khi nhìn hóa đơn hoặc quota cuối kỳ.
      - level: 2
        score: 2
        text: |-
          Ước lượng bằng heuristic hoặc dashboard tổng; chưa gắn được với ticket/PR.
      - level: 3
        score: 3
        text: |-
          Log usage thực theo session/run: input, output, cached token, latency và model.
      - level: 4
        score: 4
        text: |-
          Cost được gắn với ticket/PR/feature/team để biết workflow nào đang đắt hoặc kém hiệu quả.
      - level: 5
        score: 5
        text: |-
          Có budget guardrail và model routing theo cost/quality/latency; outlier được alert hoặc chặn tự động.

  - id: 9
    group: operations
    weight: 3
    topic: "Permissions, Sandboxing và Runtime Security"
    short: "Security"
    text: |-
      Khi agent thực thi shell command, edit file, install dependency hoặc gọi tool, môi trường thực thi được cô lập và kiểm soát đến mức nào?
    measure: "Defense-in-depth của sandbox, permission và audit."
    note: |-
      Càng cho agent nhiều quyền, càng cần runtime cô lập, tool allowlist, secret handling và audit trail rõ.
    options:
      - level: 1
        score: 1
        text: |-
          Agent chạy với quyền gần như dev local/CI runner; secret và filesystem phụ thuộc kỷ luật cá nhân.
      - level: 2
        score: 2
        text: |-
          Có container hoặc môi trường riêng, nhưng network/secret/mount policy còn rộng.
      - level: 3
        score: 3
        text: |-
          Có tool allowlist, secret masking, network policy và filesystem scope rõ cho session agent.
      - level: 4
        score: 4
        text: |-
          Session quan trọng chạy trong môi trường ephemeral/cô lập; mọi tool call và file edit có audit trail.
      - level: 5
        score: 5
        text: |-
          Permission gắn với policy repo/CI; escalation cần approval và identity của agent được trace xuyên tool.

  - id: 7
    group: capability
    weight: 2
    topic: "Đảm bảo model đủ năng lực cho tác vụ"
    short: "Model fit"
    text: |-
      Team làm gì để đảm bảo model đang dùng đủ năng lực cho hầu hết tác vụ trong dự án?
    measure: "Mức độ ghép năng lực model với độ khó, rủi ro và chi phí của task."
    note: |-
      Model “mạnh nhất” không phải lúc nào cũng là lựa chọn tốt nhất; model phù hợp là model đạt chất lượng với cost/latency/risk hợp lý.
    options:
      - level: 1
        score: 1
        text: |-
          Dùng model mặc định của tool; quyết định dựa vào hype, demo hoặc thói quen.
      - level: 2
        score: 2
        text: |-
          Chọn model sau vài thử nghiệm nội bộ, nhưng ít revisit khi task hoặc model thay đổi.
      - level: 3
        score: 3
        text: |-
          Có bộ task nội bộ để so sánh candidate model trước khi đổi model/prompt quan trọng.
      - level: 4
        score: 4
        text: |-
          Chọn model theo loại task: coding, review, long-context, tool-use, visual hoặc phân tích requirement.
      - level: 5
        score: 5
        text: |-
          Có capability routing và fallback/escalation khi model nhẹ không đạt threshold chất lượng.

  - id: 12
    group: capability
    weight: 1
    topic: "Multi-agent & Subagent Orchestration"
    short: "Orchestration"
    text: |-
      Khi dự án dùng nhiều agent/subagent hoặc nhiều workflow AI song song, việc phối hợp được tổ chức ra sao?
    measure: "Mức độ kiểm soát phối hợp giữa các agent và quyền ghi vào codebase."
    note: |-
      Nhiều agent không phải lúc nào cũng đồng nghĩa với tốt hơn. Điều quan trọng là ownership, quyền ghi và verification rõ.
    options:
      - level: 1
        score: 1
        text: |-
          Một agent làm mọi thứ trong một luồng; planning, code và verification dễ lẫn vào nhau.
      - level: 2
        score: 2
        text: |-
          Nhiều agent cùng ghi song song vào codebase, hay lệch style/kiến trúc và khó merge.
      - level: 3
        score: 3
        text: |-
          Một writer chính; agent khác chỉ hỗ trợ research/review/test hoặc làm việc trên phạm vi tách biệt rõ.
      - level: 4
        score: 4
        text: |-
          Có generator-verifier loop: agent tạo thay đổi và agent/context khác kiểm tra độc lập.
      - level: 5
        score: 5
        text: |-
          Manager/harness route task cho agent/model chuyên biệt, có guardrail escalation và conflict control.

  - id: 13
    group: capability
    weight: 1
    topic: "Team Enablement và chia sẻ tri thức"
    short: "Enablement"
    text: |-
      Khi một dev trong team tìm ra workflow AI hiệu quả, tri thức đó được lan tỏa và kiểm soát như thế nào?
    measure: "Khả năng lan tỏa thực hành tốt và kiểm soát cognitive debt."
    note: |-
      Throughput tăng không có nghĩa là hiểu biết chung tăng. Team vẫn cần shared theory of the program.
    options:
      - level: 1
        score: 1
        text: |-
          Mỗi dev tự cài tool và tự học; code AI tạo có thể được merge dù ít người hiểu.
      - level: 2
        score: 2
        text: |-
          Chia sẻ qua chat/wiki không chính thức; nội dung nhanh lỗi thời và khó biết workflow nào hiệu quả.
      - level: 3
        score: 3
        text: |-
          Có rule: human phải hiểu PR do AI tạo; workflow tốt được ghi lại trong docs/checklist.
      - level: 4
        score: 4
        text: |-
          Có cơ chế định kỳ review workflow AI, cập nhật context/skill và loại bỏ thực hành gây rework.
      - level: 5
        score: 5
        text: |-
          Knowledge map/skill catalog được cập nhật từ commit, incident và review; onboarding AI workflow gần như có hệ thống.
